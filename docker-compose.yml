services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-synchr}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-synchr}
      POSTGRES_DB: ${DB_NAME:-synchr}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-synchr} -d ${DB_NAME:-synchr}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DB_USER: ${DB_USER:-synchr}
      DB_PASSWORD: ${DB_PASSWORD:-synchr}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-synchr}
      JWT_SECRET: ${JWT_SECRET:-change_this_to_a_long_random_string}
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${FRONTEND_API_URL:-http://localhost:8080/api}
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
