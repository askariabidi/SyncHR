server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # React Router client-side routes must all fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reasonable caching for hashed build assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
